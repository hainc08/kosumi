version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: workshop_pro_mariadb
    restart: always
    environment:
      MARIADB_USER: user
      MARIADB_PASSWORD: pass
      MARIADB_DATABASE: workshop_pro
      MARIADB_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mariadbdata:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: workshop_pro_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  mariadbdata:
  redisdata:
